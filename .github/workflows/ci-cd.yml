name: CI/CD — Waifu Library

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE:  ${{ secrets.DOCKER_USERNAME }}/waifu-library-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/waifu-library-frontend

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1 & 2 : Installation des dépendances + Tests ──────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run backend tests
        working-directory: ./backend
        run: npm test
        # Le pipeline échoue ici si les tests échouent

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend (vérification)
        working-directory: ./frontend
        run: npm run build

  # ── 3 & 4 : Build Docker + Push sur Docker Hub ───────────────────────────
  build-and-push:
    name: Build & Push Docker
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 5 & 6 : Déploiement sur VM + Mise à jour Kubernetes ──────────────────
  deploy:
    name: Deploy → VM & Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            echo "==> Déploiement du commit ${{ github.sha }}"

            # Mise à jour des images dans Kubernetes
            kubectl set image deployment/backend  \
              backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }}  \
              -n waifu-library

            kubectl set image deployment/frontend \
              frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
              -n waifu-library

            # Attente de la fin du rollout
            kubectl rollout status deployment/backend  -n waifu-library --timeout=120s
            kubectl rollout status deployment/frontend -n waifu-library --timeout=120s

            echo "==> Déploiement réussi !"
            kubectl get pods -n waifu-library

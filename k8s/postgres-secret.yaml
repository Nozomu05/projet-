apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: waifu-library
type: Opaque
data:
  # Valeurs encodées en base64
  # echo -n "waifudb"  | base64  → d2FpZnVkYg==
  # echo -n "postgres" | base64  → cG9zdGdyZXM=
  # IMPORTANT: changer le mot de passe en production !
  POSTGRES_DB:       d2FpZnVkYg==
  POSTGRES_USER:     cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXM=

services:

  postgres:
    image: postgres:16-alpine
    container_name: waifu-postgres
    environment:
      POSTGRES_DB:       ${DB_NAME:-waifudb}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waifu-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: waifu-backend
    environment:
      PORT:         3000
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      ${DB_NAME:-waifudb}
      DB_USER:      ${DB_USER:-postgres}
      DB_PASSWORD:  ${DB_PASSWORD:-postgres}
      CORS_ORIGIN:  ${CORS_ORIGIN:-*}
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - waifu-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: waifu-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - waifu-net
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:

networks:
  waifu-net:
    driver: bridge
